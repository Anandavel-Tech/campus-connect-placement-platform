<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Connect - Login & Register</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="auth-container">
            <div class="auth-header">
                <h1>Campus Connect</h1>
                <p>Intelligent Campus Placement & Career Guidance Platform</p>
            </div>
            
            <div class="auth-tabs">
                <button class="tab-btn active" onclick="showTab('login')">Login</button>
                <button class="tab-btn" onclick="showTab('register')">Register</button>
            </div>
            
            <!-- Login Form -->
            <div id="login-form" class="auth-form active">
                <h2>Welcome Back!</h2>
                <form onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label for="login-email">Email Address</label>
                        <input type="email" id="login-email" required>
                    </div>
                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" required>
                    </div>
                    <button type="submit" class="btn-primary">Login</button>
                </form>
            </div>
            
            <!-- Register Form -->
            <div id="register-form" class="auth-form">
                <h2>Create Account</h2>
                <form onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label for="reg-name">Full Name</label>
                        <input type="text" id="reg-name" required>
                    </div>
                    <div class="form-group">
                        <label for="reg-email">Email Address</label>
                        <input type="email" id="reg-email" required>
                    </div>
                    <div class="form-group">
                        <label for="reg-password">Password</label>
                        <input type="password" id="reg-password" required>
                    </div>
                    <div class="form-group">
                        <label for="reg-role">Role</label>
                        <select id="reg-role" onchange="toggleStudentFields()">
                            <option value="student">Student</option>
                            <option value="recruiter">Recruiter</option>
                        </select>
                    </div>
                    
                    <!-- Student-specific fields -->
                    <div id="student-fields">
                        <div class="form-group">
                            <label for="reg-roll">Roll Number</label>
                            <input type="text" id="reg-roll">
                        </div>
                        <div class="form-group">
                            <label for="reg-dept">Department</label>
                            <input type="text" id="reg-dept">
                        </div>
                        <div class="form-group">
                            <label for="reg-cgpa">CGPA</label>
                            <input type="number" id="reg-cgpa" step="0.01" min="0" max="10">
                        </div>
                        <div class="form-group">
                            <label for="reg-skills">Skills (comma separated)</label>
                            <input type="text" id="reg-skills">
                        </div>
                    </div>
                    
                    <!-- Recruiter-specific fields -->
                    <div id="recruiter-fields" style="display:none;">
                        <div class="form-group">
                            <label for="reg-company">Company Name</label>
                            <input type="text" id="reg-company">
                        </div>
                        <div class="form-group">
                            <label for="reg-company-desc">Company Description</label>
                            <textarea id="reg-company-desc" rows="3"></textarea>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn-primary">Register</button>
                </form>
            </div>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
